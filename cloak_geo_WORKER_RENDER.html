<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Carolina</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Ccircle%20cx%3D%2232%22%20cy%3D%2232%22%20r%3D%2232%22%20fill%3D%22%231d9bf0%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2244%22%20font-family%3D%22Helvetica%2CArial%2Csans-serif%22%20font-size%3D%2236%22%20font-weight%3D%22700%22%20fill%3D%22white%22%20text-anchor%3D%22middle%22%3EC%3C%2Ftext%3E%3C%2Fsvg%3E">
<meta name="theme-color" content="#000000">
<style>
  :root { --accent:#1d9bf0; --img:url('https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=720&amp;h=1280&amp;fit=crop&amp;q=80'); }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0b0b0d}
  .bg-blur{position:fixed;inset:0;background-image:var(--img);background-size:cover;background-position:center;filter:blur(34px) brightness(.55) saturate(1.25);transform:scale(1.15);z-index:0}
  .stage{position:relative;z-index:1;height:100dvh;aspect-ratio:9/16;max-width:100vw;margin:0 auto;background-image:var(--img);background-size:cover;background-position:center 22%;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.55)}
  .stage::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05) 35%,rgba(0,0,0,.35) 70%,rgba(0,0,0,.55) 100%)}
  .panel{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);width:calc(100% - 28px);max-width:430px;z-index:2;background:rgba(18,18,22,.42);border:1px solid rgba(255,255,255,.10);border-radius:22px;backdrop-filter:blur(9px) saturate(125%);-webkit-backdrop-filter:blur(9px) saturate(125%);padding:20px 18px 18px;text-align:center;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.45);box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .name{font-size:30px;font-weight:800;margin:0 0 7px;letter-spacing:.2px}
  .loc{font-size:17px;font-weight:600;margin:0 0 11px;opacity:.97}
  .status{font-size:15px;font-weight:600;margin:0 0 9px}
  .status .dot{font-size:11px;vertical-align:middle}
  .blurb{font-size:16px;line-height:1.35;margin:0 auto 16px;max-width:330px;opacity:.97}
  .blurb b{font-weight:700}
  @keyframes heartbeat{0%,30%,70%,100%{transform:scale(1)}15%,45%{transform:scale(1.04)}}
  .cta{display:block;width:100%;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px 18px;font-size:18px;font-weight:800;letter-spacing:.3px;text-decoration:none;cursor:pointer;box-shadow:0 10px 38px 2px rgba(29,155,240,.45);animation:heartbeat 1.8s ease-in-out infinite;transform-origin:center center}
  .cta:hover{animation-play-state:paused}
  .cta:active{transform:scale(.98);filter:brightness(1.06)}
  .timer{margin:13px 0 2px;font-size:15px;font-weight:600;opacity:.96}
  .timer .count{color:#ff4d4f;font-variant-numeric:tabular-nums;font-weight:800}
</style>
</head>
<body>
  <div class="bg-blur"></div>
  <div class="stage">
    <div class="panel">
      <h1 class="name">Carolina ❣️</h1>
      <div class="loc">📍 Timișoara, Romania</div>
      <div class="status"><span class="dot">🟢</span> Available now · Responds in 2 minutes</div>
      <p class="blurb">I live near <b>Timișoara</b>, let's get to know each other 🥰</p>
      <a class="cta" href="/r?utm_source=x&utm_medium=organic&utm_campaign=caro1&utm_content=story_link" rel="noopener">SEND ME A MESSAGE ❤️</a>
      <div class="timer">FREE TRIAL TODAY ends in <span class="count" id="count">15:00</span></div>
    </div>
  </div>
<script>
  (function(){
    var DURATION=15*60*1000,KEY='cgx_deadline';
    var dl=parseInt(localStorage.getItem(KEY)||'0',10),now=Date.now();
    if(!dl||dl<now){dl=now+DURATION;localStorage.setItem(KEY,String(dl));}
    var el=document.getElementById('count');
    function tick(){var left=dl-Date.now();if(left<=0){dl=Date.now()+DURATION;localStorage.setItem(KEY,String(dl));left=DURATION;}var m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);el.textContent=m+':'+(s<10?'0':'')+s;}
    tick();setInterval(tick,1000);
  })();
</script>
</body>
</html>
